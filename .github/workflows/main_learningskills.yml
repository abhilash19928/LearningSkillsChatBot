name: Build and deploy React app to Azure Web App - learningskills

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'   # Recommended LTS for production React apps

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload artifact (React dist output)
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist/
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B0532847491B4F85B05E8F128FCF7573 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0F16A8FFE22F490DA4AA55FF239C6FF4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C1C8D46918F24AC7BC0F1B7A5790ACE4 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'learningskills'
          slot-name: 'Production'
          package: ./   # Deploying the dist folder content